name: "Workflow DDoS MarTumMai Guard"

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-security:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync --dev

      - name: Linting
        run: uv run ruff check .

      - name: Type Checking
        run: uv run mypy src/

      - name: Security Scan
        continue-on-error: true
        run: uv run bandit -r src/ -c pyproject.toml --exclude tests/

  testing:
    name: Unit Testing
    needs: quality-and-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install System Libs (libpcap)
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Install uv & Deps
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv sync

      - name: Run Pytest
        run: uv run pytest --cov tests/

  build-package:
    name: Build .deb Package
    needs: testing
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install NFPM
        run: echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list && sudo apt-get update && sudo apt-get install nfpm

      - name: Build .deb
        run: nfpm package --packager deb --target ddos-martummai_${{ github.ref_name }}_amd64.deb

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ddos-martummai_*.deb
          draft: true
