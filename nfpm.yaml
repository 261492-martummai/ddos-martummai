name: "ddos-martummai"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
section: "admin"
priority: "optional"
maintainer: "Your Name <email@example.com>"
description: "DDoS Detection System using Machine Learning"
vendor: "CPE CMU"
license: "MIT"

contents:
  - src: ./src/ddos_martummai
    dst: /opt/ddos-martummai/src/ddos_martummai

  - src: ./src/cicflowmeter
    dst: /opt/ddos-martummai/src/cicflowmeter

  - src: ./pyproject.toml
    dst: /opt/ddos-martummai/pyproject.toml

  - src: ./uv.lock
    dst: /opt/ddos-martummai/uv.lock

  - src: ./README.md
    dst: /opt/ddos-martummai/README.md

  - src: ./config/config.example.yml
    dst: /opt/ddos-martummai/config.example.yml
    type: config

  - src: ./system/logrotate.conf
    dst: /etc/logrotate.d/ddos-martummai
    type: config

  - src: ./system/ddos-martummai.service
    dst: /lib/systemd/system/ddos-martummai.service

  - src: ./system/ddos-martummai
    dst: /usr/bin/ddos-martummai
    file_info:
      mode: 0755

scripts:
  postinstall: ./system/postinstall.sh
  preremove: ./system/preremove.sh

depends:
  - libpcap-dev
  - python3
  - python3-venv
  - iptables
  - ipset
