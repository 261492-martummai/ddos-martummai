<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NET·MONITOR — Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/style-login.css" />
</head>
<body>

  <button id="theme-btn" title="Toggle theme">
    <span class="icon">🌙</span>
    <span class="label">DARK</span>
  </button>

  <div class="card">

    <div class="card-header">
      <div class="brand">// NET·MONITOR</div>
      <div class="title">SECURE ACCESS</div>
      <div class="subtitle">AUTHENTICATION REQUIRED · AUTHORISED PERSONNEL ONLY</div>
    </div>

    <div class="fields">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="operator" autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <div class="error-msg" id="error-msg">
      <div class="pulse" style="background:var(--accent2);box-shadow:0 0 7px var(--accent2);animation:none;"></div>
      <span id="error-text"></span>
    </div>

    <button class="submit-btn" id="login-btn">
      <span>AUTHENTICATE</span>
    </button>

  </div>

  <script>
    // ── Theme toggle (mirrors index.html logic) ────────────
    let currentTheme = localStorage.getItem('nm-theme') || 'dark';

    function applyTheme(t) {
      document.documentElement.classList.toggle('light', t === 'light');
      document.querySelector('#theme-btn .icon').textContent  = t === 'dark' ? '🌙' : '☀️';
      document.querySelector('#theme-btn .label').textContent = t === 'dark' ? 'DARK' : 'LIGHT';
      localStorage.setItem('nm-theme', t);
    }

    document.getElementById('theme-btn').addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      applyTheme(currentTheme);
    });

    applyTheme(currentTheme);   // restore on load

    // ── Auth logic ────────────────────────────────────────
    const errorBox  = document.getElementById('error-msg');
    const errorText = document.getElementById('error-text');
    const loginBtn  = document.getElementById('login-btn');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');

    function showError(msg) {
      errorText.textContent = msg;
      errorBox.classList.add('visible');
    }

    function clearError() {
      errorBox.classList.remove('visible');
    }

    // Clear error as soon as user starts typing again
    usernameEl.addEventListener('input', clearError);
    passwordEl.addEventListener('input', clearError);

    // Allow Enter key on either field to submit
    [usernameEl, passwordEl].forEach(el => {
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doLogin();
      });
    });

    async function doLogin() {
      const username = usernameEl.value.trim();
      const password = passwordEl.value;

      if (!username) { showError('USERNAME REQUIRED'); usernameEl.focus(); return; }
      if (!password) { showError('PASSWORD REQUIRED'); passwordEl.focus(); return; }

      loginBtn.classList.add('loading');
      clearError();

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include',   // send/receive session cookie
        });

        if (res.ok) {
          // Successful auth → redirect to monitor
          window.location.replace('/monitor');
        } else {
          const body = await res.json().catch(() => ({}));
          showError(body.detail || 'INVALID CREDENTIALS');
          passwordEl.value = '';
          passwordEl.focus();
        }
      } catch {
        showError('SERVER UNREACHABLE');
      } finally {
        loginBtn.classList.remove('loading');
      }
    }

    loginBtn.addEventListener('click', doLogin);

    // Auto-focus username on load
    usernameEl.focus();
  </script>
</body>
</html>
