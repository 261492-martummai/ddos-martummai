<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NET·MONITOR — Access</title>
    <link rel="icon" href="static/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="static/css/style.css" />
  </head>
  <body>
    <div style="justify-items: right;">
      <button id="theme-btn" title="Toggle theme">
        <span class="icon">🌙</span>
        <span class="label">DARK</span>
      </button>
    </div>
    <div class="body-login">
      <div class="card">
        <div class="card-header">
          <div class="brand">// MARTUMMAI·MONITOR</div>
          <div class="title">SECURE ACCESS</div>
          <div class="subtitle">
            AUTHENTICATION REQUIRED · AUTHORISED PERSONNEL ONLY
          </div>
        </div>

        <div class="fields">
          <div class="field">
            <label for="username">Username</label>
            <input
              id="username"
              type="text"
              placeholder="operator"
              autocomplete="username"
            />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>
        </div>

        <div class="error-msg" id="error-msg">
          <div
            class="pulse"
            style="
              background: var(--accent2);
              box-shadow: 0 0 7px var(--accent2);
              animation: none;
            "
          ></div>
          <span id="error-text"></span>
        </div>

        <button class="submit-btn" id="login-btn">
          <span>AUTHENTICATE</span>
        </button>
      </div>
    </div>
    <script src="static/js/login.js"></script>
  </body>
</html>
